<div class="container-fluid">
    <div class="row">
        <div class="col-lg-2">
            <app-sidebar></app-sidebar>
        </div>
        <div class="col">
            <div class="d-flex justify-content-center align-items-center flex-column">
                <h1 class="mt-5">
                    @if(recipeId){  Update }@else {  Add } Recipe Details
                </h1>
                <div style="width: 900px;" class="border p-5 rounded my-5">
                    <div class="row">
                        <div class="col-lg-6">
                            <div class="mb-2">
                                <input [(ngModel)]="recipeDetails().name" placeholder="Recipe Name" type="text" class="form-control">
                            </div>
                            <div class="mb-2">
                                <input [(ngModel)]="recipeDetails().cuisine" placeholder="Recipe Cuisine Type" type="text" class="form-control">
                            </div>
                            <div class="mb-2">
                                <input [(ngModel)]="recipeDetails().image" placeholder="Recipe Image URL" type="text" class="form-control">
                            </div>
                            <div class="mb-2">
                                <input [(ngModel)]="recipeDetails().prepTimeMinutes" placeholder="Recipe Preparation Time in Minutes (ex: 25)" type="text" class="form-control">
                            </div>
                            <div class="mb-2">
                                <div class="d-flex mb-2">
                                    <textarea #ingredientInput placeholder="Add Ingredient" class="form-control"></textarea>
                                    <button (click)="addIngredient(ingredientInput)" class="btn fw-bolder fs-1 ms-1">+</button>
                                </div>
                                <!-- display Ingredient list -->
                                @for(item of ingredientArray; track $index){
                                    <div class="d-flex mb-1">
                                        <input [value]="item" placeholder="Ingredient" type="text" class="form-control" readonly>
                                        <button (click)="removeIngredient(item)" class="btn fw-bolder"> <i class="fa-solid fa-trash text-danger"></i> </button>
                                    </div>
                                }
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="mb-2">
                                <input [(ngModel)]="recipeDetails().servings" placeholder="Servings (ex: 4)" type="text" class="form-control">
                            </div>
                            <div class="mb-2">
                                <input [(ngModel)]="recipeDetails().caloriesPerServing" placeholder="Calorie per Serving (ex:350)" type="text" class="form-control">
                            </div>
                            <div class="mb-2">
                                <input [(ngModel)]="recipeDetails().cookTimeMinutes" placeholder="Recipe Cook Time in Minutes (ex: 25)" type="text" class="form-control">
                            </div>
                            <div class="mb-2">
                                <select [(ngModel)]="recipeDetails().difficulty" class="form-control" >
                                    <option selected disabled hidden>Choose Mode of Cooking</option>
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <div class="d-flex mb-2">
                                    <textarea #instrcutionInput placeholder="Add Instruction" class="form-control"></textarea>
                                    <button (click)="addInstrcution(instrcutionInput)" class="btn fw-bolder fs-1 ms-1">+</button>
                                </div>
                                <!-- display intsruction list -->
                                @for(item of instructionArray;track $index){
                                    <div class="d-flex mb-1">
                                        <input [value]="item" placeholder="Instruction" type="text" class="form-control" readonly>
                                        <button (click)="removeInstrcution(item)" class="btn fw-bolder"> <i class="fa-solid fa-trash text-danger"></i> </button>
                                    </div>
                                }
                            </div>
                        </div>
                    </div>
                    <div class="d-flex mb-2">
                        <textarea #mealInput placeholder="Add Meal Type (ex: Breakfast, Lunch, Dinner etc..)" class="form-control"></textarea>
                        <button (click)="addMeal(mealInput)" class="btn fw-bolder fs-1 ms-1">+</button>
                    </div>
                    <!-- display added meal type -->
                     <div class="d-flex flex-wrap">
                        @for(item of mealTypeArray; track $index){
                            <span class="border rounded ps-2 me-1">{{item}} 
                                <button (click)="removeMeal(item)" class="btn fw-bolder"><i class="fa-solid fa-x"></i> </button>
                            </span>
                            }
                        </div>
                     
                    <div class="text-center mt-3">
                        @if(recipeId){
                            <button class="btn btn-warning fw-bolder text-light">UPDATE RECIPE</button>
                        }@else{
                            <button (click)="addRecipe()" class="btn btn-success fw-bolder">ADD RECIPE</button>
                        }
                    </div>
                </div>
            </div>
           
        </div>
    </div>
</div>
